<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球大國博弈戰略地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            panel: '#1e293b',
                            accent: '#38bdf8',
                            warning: '#fbbf24',
                            danger: '#f87171'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden; /* Prevent body scroll */
        }
        
        .country {
            fill: #334155;
            stroke: #0f172a;
            stroke-width: 0.5px;
            transition: fill 0.3s, opacity 0.3s;
            cursor: pointer;
        }
        
        .country:hover {
            fill: #475569;
        }
        
        /* Top 30 Countries default style */
        .country.top-30 {
            fill: #1e3a8a;
            stroke: #60a5fa;
            stroke-width: 0.5px;
        }
        
        .country.top-30:hover {
            fill: #3b82f6;
            filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.8));
        }

        /* Selected Country */
        .country.selected {
            fill: #38bdf8 !important;
            stroke: #fff !important;
            stroke-width: 1.5px !important;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 1));
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            opacity: 0;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #38bdf8;
            border-radius: 8px;
            padding: 8px 12px;
            pointer-events: none;
            font-size: 14px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transition: opacity 0.2s;
        }

        /* Scrollbar styling for panel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        /* Glassmorphism effects */
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Loading spinner */
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row">

    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-brand-dark">

    </div>

    <!-- Tooltip -->
    <div id="tooltip"></div>

    <!-- Main Map Area -->

            </div>
            
            <div class="pointer-events-auto flex gap-2">

                </button>
            </div>
        </header>

        <!-- D3 Map Container -->
        <div id="map" class="w-full h-full bg-[#020617] cursor-grab active:cursor-grabbing"></div>
    </div>

            // 提供部分通用資料避免點擊出錯

            "Australia": { name: "澳洲", continent: "南太平洋", pop: "2,600萬", gdp: "1.7兆", gni: "60,000", debt: "約55%", tech: "鐵礦砂、煤炭、農牧", military: "16", analysis: { desired: ["供應鏈多元化","核動力潛艦","綠能轉型"], cannotLose: ["美澳同盟","海上生命線","資源定價權"], strongest: ["礦產出口","高水準農產","宜居環境"], weakness: ["對單一市場(中國)出口過度依賴","氣候變遷衝擊","製造業空洞"], confident: ["豐富天然資源","穩定的金融體系","強大教育出口"] } },
            "South Korea": { name: "韓國", continent: "東北亞", pop: "5,100萬", gdp: "1.7兆", gni: "35,000", debt: "約55%", tech: "記憶體晶片、造船、消費電子", military: "5", analysis: { desired: ["擺脫北韓威脅","突破高階晶片封裝","軟體實力"], cannotLose: ["美韓同盟","財閥競爭力","出口市場"], strongest: ["記憶體壟斷","文化輸出(K-pop)","造船技術"], weakness: ["全球最低生育率","財閥壟斷經濟","地緣高風險"], confident: ["極高的工程效率","造星與文化產業","重工業基礎"] } }
        };

        // Name Mapper to handle GeoJSON country names matching our Database keys
        const nameMapper = {
            "United States of America": "USA",
            "USA": "USA",
            "China": "China",
            "Japan": "Japan",
            "Taiwan": "Taiwan",
            "Germany": "Germany",
            "India": "India",
            "United Kingdom": "UK",
            "England": "UK",
            "Russia": "Russia",
            "France": "France",
            "Australia": "Australia",
            "South Korea": "South Korea",
            "Republic of Korea": "South Korea",
            "Brazil": "Brazil",
            "Italy": "Italy",
            "Canada": "Canada"
            // Others can be added. If not mapped and not in database, click does nothing.
        };

        // DOM Elements
        const mapContainer = document.getElementById('map');
        const infoPanel = document.getElementById('info-panel');
        const panelContent = document.getElementById('panel-content');
        const panelEmpty = document.getElementById('panel-empty');
        const closePanelBtn = document.getElementById('close-panel-btn');
        const tooltip = document.getElementById('tooltip');
        const loadingScreen = document.getElementById('loading');

        // State
        let selectedCountryId = null;

        // D3 Setup
        const width = mapContainer.clientWidth;
        const height = mapContainer.clientHeight;

        const svg = d3.select("#map")
            .append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("preserveAspectRatio", "xMidYMid meet");

        const g = svg.append("g");

        // Map Projection
        const projection = d3.geoMercator()
            .scale(width / 6.5)
            .translate([width / 2, height / 1.5]);

        const path = d3.geoPath().projection(projection);

        // Zoom Behavior
        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Reset view button
        document.getElementById('reset-view').addEventListener('click', () => {
            svg.transition().duration(750).call(
                zoom.transform, 
                d3.zoomIdentity, 
                d3.zoomTransform(svg.node()).invert([width / 2, height / 2])
            );
        });

        // Mobile panel close handler
        closePanelBtn.addEventListener('click', () => {
            infoPanel.classList.add('translate-y-full');
            // Remove selection highlight
            d3.selectAll('.country').classed('selected', false);
            selectedCountryId = null;
        });

        // Load GeoJSON Data
        const geoDataUrl = "https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson";

        d3.json(geoDataUrl).then(data => {
            // Remove Loading Screen
            loadingScreen.classList.add('hidden');

            // Draw Map
            g.selectAll("path")
                .data(data.features)
                .enter()
                .append("path")
                .attr("class", d => {
                    let geoName = d.properties.name;
                    let mappedKey = nameMapper[geoName] || geoName;
                    // 如果存在於我們的資料庫，加上 top-30 class 使其發光
                    if (database[mappedKey]) {
                        return "country top-30";
                    }
                    return "country";
                })
                .attr("d", path)
                .attr("id", d => d.id || d.properties.name.replace(/\s+/g, ''))
                .on("mouseover", function(event, d) {
                    let geoName = d.properties.name;
                    let mappedKey = nameMapper[geoName] || geoName;
                    let displayInfo = database[mappedKey] ? `${database[mappedKey].name} (點擊查看情報)` : geoName;

                    tooltip.innerHTML = displayInfo;
                    tooltip.style.opacity = 1;
                })
                .on("mousemove", function(event) {
                    tooltip.style.left = (event.pageX + 15) + "px";
                    tooltip.style.top = (event.pageY - 20) + "px";
                })
                .on("mouseout", function() {
                    tooltip.style.opacity = 0;
                })
                .on("click", function(event, d) {
                    let geoName = d.properties.name;
                    let mappedKey = nameMapper[geoName] || geoName;
                    
                    if (database[mappedKey]) {
                        // Highlight selection
                        d3.selectAll('.country').classed('selected', false);
                        d3.select(this).classed('selected', true);
                        selectedCountryId = mappedKey;

                        // Pan map to country (optional, kept simple for UX)
                        // Update Data Panel
                        updatePanel(database[mappedKey]);
                    }
                });

        }).catch(err => {
            console.error("Error loading map data:", err);
            loadingScreen.innerHTML = `<h2 class="text-xl text-brand-danger">地圖載入失敗，請確認網路連線。</h2>`;
        });

        // UI Update Function
        function updatePanel(data) {
            // Show panel content, hide empty state
            panelEmpty.classList.add('hidden');
            panelContent.classList.remove('hidden');
            panelContent.classList.add('flex');

            // Mobile slide up
            infoPanel.classList.remove('translate-y-full');

            // Populate Text Data
            document.getElementById('country-name').innerText = data.name;
            document.getElementById('country-continent').innerText = data.continent;
            document.getElementById('country-pop').innerText = data.pop;
            document.getElementById('country-gdp').innerText = `${data.gdp} 美元`;
            document.getElementById('country-gni').innerText = `${data.gni} 美元`;
            document.getElementById('country-debt').innerText = data.debt;
            document.getElementById('country-tech').innerText = data.tech;
            document.getElementById('country-military').innerText = `No.${data.military}`;

            // Populate Analysis Lists
            populateList('analysis-desired', data.analysis.desired);
            populateList('analysis-cannot-lose', data.analysis.cannotLose);
            populateList('analysis-strongest', data.analysis.strongest);
            populateList('analysis-weakness', data.analysis.weakness);
            populateList('analysis-confident', data.analysis.confident);
        }

        function populateList(elementId, items) {
            const ul = document.getElementById(elementId);
            ul.innerHTML = '';
            if(!items || items.length === 0) {
                ul.innerHTML = '<li class="text-slate-500 italic">無詳細資料</li>';
                return;
            }
            items.forEach(item => {
                const li = document.createElement('li');
                li.innerText = item;
                ul.appendChild(li);
            });
        }

        // Handle resize window event to keep map scaling properly
        window.addEventListener('resize', () => {
            const w = mapContainer.clientWidth;
            const h = mapContainer.clientHeight;
            svg.attr("viewBox", `0 0 ${w} ${h}`);
        });

    </script>
</body>
</html>
