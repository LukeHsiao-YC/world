<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球大國博弈戰略地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            panel: '#1e293b',
                            accent: '#38bdf8',
                            warning: '#fbbf24',
                            danger: '#f87171',
                            ally: '#34d399',
                            similar: '#fb923c'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .country {
            fill: #334155;
            stroke: #0f172a;
            stroke-width: 0.5px;
            transition: fill 0.3s, stroke 0.3s, filter 0.3s;
            cursor: pointer;
        }
        
        .country:hover { fill: #475569; }
        
        .country.top-30 {
            fill: #1e3a8a;
            stroke: #60a5fa;
            stroke-width: 0.5px;
        }
        .country.top-30:hover {
            fill: #3b82f6;
            filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.8));
        }

        /* Highlight classes */
        .country.selected {
            fill: #38bdf8 !important;
            stroke: #fff !important;
            stroke-width: 1.5px !important;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 1));
            z-index: 10;
        }

        .country.ally {
            fill: #064e3b !important; 
            stroke: #34d399 !important; 
            stroke-width: 1.2px !important;
            filter: drop-shadow(0 0 4px rgba(52, 211, 153, 0.6));
        }

        .country.similar {
            fill: #451a03 !important; 
            stroke: #fb923c !important; 
            stroke-width: 1.2px !important;
            filter: drop-shadow(0 0 4px rgba(251, 146, 60, 0.6));
        }

        #tooltip {
            position: absolute;
            opacity: 0;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #38bdf8;
            border-radius: 8px;
            padding: 8px 12px;
            pointer-events: none;
            font-size: 14px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transition: opacity 0.2s;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row">

    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-brand-dark">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-semibold text-brand-accent animate-pulse">載入全球戰略圖資中...</h2>
    </div>

    <div id="tooltip"></div>

    <div class="relative flex-1 h-[60vh] md:h-screen w-full overflow-hidden flex flex-col">

                        大國博弈戰略地圖

                    <p class="text-xs text-slate-400 mt-1">點擊發光國家，查看戰略數據與關係網。</p>
                </div>
                <!-- Map Legend -->
                <div class="bg-brand-dark/80 backdrop-blur-md p-2 rounded-lg border border-slate-700 shadow-lg flex gap-3 text-xs w-max">

                    <div class="flex items-center gap-1"><span class="w-3 h-3 bg-[#064e3b] border border-[#34d399] rounded-full inline-block"></span> 戰略盟友</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 bg-[#451a03] border border-[#fb923c] rounded-full inline-block"></span> 相似/競爭</div>
                </div>
            </div>
            
            <div class="pointer-events-auto flex gap-2">
                <button id="reset-view" class="bg-slate-800 hover:bg-slate-700 text-white p-2 rounded-lg transition shadow border border-slate-600" title="重置視角">
                    <i class="fa-solid fa-compress"></i>
                </button>
            </div>
        </header>

        <div id="map" class="w-full h-full bg-[#020617] cursor-grab active:cursor-grabbing"></div>
    </div>

    <div id="info-panel" class="glass-panel absolute md:relative bottom-0 left-0 right-0 md:w-[400px] lg:w-[480px] h-[50vh] md:h-screen transform translate-y-full md:translate-y-0 transition-transform duration-300 ease-in-out z-40 overflow-y-auto flex flex-col border-t md:border-t-0 shadow-2xl">

                    </div>
                    <div class="bg-brand-warning/10 px-2 py-1 rounded border border-brand-warning/30">

            </div>

        const mapContainer = document.getElementById('map');
        const infoPanel = document.getElementById('info-panel');
        const panelContent = document.getElementById('panel-content');
        const panelEmpty = document.getElementById('panel-empty');
        const closePanelBtn = document.getElementById('close-panel-btn');
        const tooltip = document.getElementById('tooltip');
        const loadingScreen = document.getElementById('loading');

        let selectedCountryId = null;

        const width = mapContainer.clientWidth;
        const height = mapContainer.clientHeight;

        const svg = d3.select("#map")
            .append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("preserveAspectRatio", "xMidYMid meet");

        const g = svg.append("g");

        const projection = d3.geoMercator()
            .scale(width / 6.5)
            .translate([width / 2, height / 1.5]);

        const path = d3.geoPath().projection(projection);

        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        document.getElementById('reset-view').addEventListener('click', () => {
            svg.transition().duration(750).call(
                zoom.transform, 
                d3.zoomIdentity, 
                d3.zoomTransform(svg.node()).invert([width / 2, height / 2])
            );
            // Optional: reset selection on zoom reset
        });

        closePanelBtn.addEventListener('click', () => {
            infoPanel.classList.add('translate-y-full');
            d3.selectAll('.country')
                .classed('selected', false)
                .classed('ally', false)
                .classed('similar', false);
            selectedCountryId = null;
        });

        // 核心切換邏輯 (點擊地圖或點擊按鈕時觸發)
        window.selectCountry = function(countryKey) {
            if (!database[countryKey]) return;
            selectedCountryId = countryKey;

            // Update Map Highlighting
            d3.selectAll('.country').each(function(d) {
                let geoName = d.properties.name;
                let mappedKey = nameMapper[geoName] || geoName;
                let node = d3.select(this);
                
                node.classed('selected', false).classed('ally', false).classed('similar', false);
                
                if (mappedKey === countryKey) {
                    node.classed('selected', true);
                    // Bring to front
                    this.parentNode.appendChild(this);
                } else if (database[countryKey].allies && database[countryKey].allies.includes(mappedKey)) {
                    node.classed('ally', true);
                } else if (database[countryKey].similar && database[countryKey].similar.includes(mappedKey)) {
                    node.classed('similar', true);
                }
            });

            updatePanel(database[countryKey]);
        };

        const geoDataUrl = "https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson";

        d3.json(geoDataUrl).then(data => {
            loadingScreen.classList.add('hidden');

            g.selectAll("path")
                .data(data.features)
                .enter()
                .append("path")
                .attr("class", d => {
                    let geoName = d.properties.name;
                    let mappedKey = nameMapper[geoName] || geoName;
                    return database[mappedKey] ? "country top-30" : "country";
                })
                .attr("d", path)
                .on("mouseover", function(event, d) {
                    let geoName = d.properties.name;
                    let mappedKey = nameMapper[geoName] || geoName;
                    let displayInfo = database[mappedKey] ? `${database[mappedKey].name} (點擊查看情報)` : geoName;
                    tooltip.innerHTML = displayInfo;
                    tooltip.style.opacity = 1;
                })
                .on("mousemove", function(event) {
                    tooltip.style.left = (event.pageX + 15) + "px";
                    tooltip.style.top = (event.pageY - 20) + "px";
                })
                .on("mouseout", function() {
                    tooltip.style.opacity = 0;
                })
                .on("click", function(event, d) {
                    let geoName = d.properties.name;
                    let mappedKey = nameMapper[geoName] || geoName;
                    if (database[mappedKey]) {
                        window.selectCountry(mappedKey);
                    }
                });

        }).catch(err => {
            console.error("Error loading map data:", err);
            loadingScreen.innerHTML = `<h2 class="text-xl text-brand-danger">地圖載入失敗，請確認網路連線。</h2>`;
        });

        function updatePanel(data) {
            panelEmpty.classList.add('hidden');
            panelContent.classList.remove('hidden');
            panelContent.classList.add('flex');
            infoPanel.classList.remove('translate-y-full');

            document.getElementById('country-name').innerText = data.name;
            document.getElementById('country-continent').innerText = data.continent;
            document.getElementById('country-gdp-rank').innerText = data.gdpRank;
            document.getElementById('country-pop').innerText = data.pop;
            document.getElementById('country-gdp').innerText = `${data.gdp}兆美元`;
            document.getElementById('country-gni').innerText = `${data.gni}美元`;
            document.getElementById('country-debt').innerText = data.debt;
            document.getElementById('country-tech').innerText = data.tech;
            document.getElementById('country-military').innerText = data.military;

            renderTags('country-allies', data.allies, 'ally');
            renderTags('country-similar', data.similar, 'similar');

            populateList('analysis-desired', data.analysis.desired);
            populateList('analysis-cannot-lose', data.analysis.cannotLose);
            populateList('analysis-strongest', data.analysis.strongest);
            populateList('analysis-weakness', data.analysis.weakness);
            populateList('analysis-confident', data.analysis.confident);
            
            // Scroll to top of panel on new selection
            infoPanel.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderTags(elementId, keys, type) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            if (!keys || keys.length === 0) {
                container.innerHTML = '<span class="text-xs text-slate-500 italic">無相關數據</span>';
                return;
            }
            
            // Determine button styling based on relationship type
            const colorClasses = type === 'ally' 
                ? 'bg-[#064e3b]/80 hover:bg-[#34d399] hover:text-black border-[#34d399]/50 text-[#34d399]' 
                : 'bg-[#451a03]/80 hover:bg-[#fb923c] hover:text-black border-[#fb923c]/50 text-[#fb923c]';

            keys.forEach(key => {
                if (!database[key]) return; // Skip if country not in top 30 db
                const btn = document.createElement('button');
                btn.className = `text-xs px-2.5 py-1 rounded transition-colors border cursor-pointer font-medium ${colorClasses}`;
                btn.innerText = database[key].name;
                btn.onclick = () => window.selectCountry(key);
                container.appendChild(btn);
            });
        }

        function populateList(elementId, items) {
            const ul = document.getElementById(elementId);
            ul.innerHTML = '';
            if(!items || items.length === 0) {
                ul.innerHTML = '<li class="text-slate-500 italic">無詳細資料</li>';
                return;
            }
            items.forEach(item => {
                const li = document.createElement('li');
                li.innerText = item;
                ul.appendChild(li);
            });
        }

        window.addEventListener('resize', () => {
            const w = mapContainer.clientWidth;
            const h = mapContainer.clientHeight;
            svg.attr("viewBox", `0 0 ${w} ${h}`);
        });

    </script>
</body>
</html>
